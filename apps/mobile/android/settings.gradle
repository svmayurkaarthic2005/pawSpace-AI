pluginManagement {
    def command = ["node", "--print", "require.resolve('@react-native/gradle-plugin/package.json')"]
    def resolvedFile = new File(command.execute(null, rootDir).text.trim()).getParentFile()
    includeBuild(resolvedFile)
}

rootProject.name = "PawSpace"

