buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 23
        compileSdkVersion = 35
        targetSdkVersion = 35
        ndkVersion = "25.1.8937393"
        kotlinVersion = "2.0.21"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.6.1")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
        classpath("com.google.gms:google-services:4.4.0")
    }
}

// React Native 0.73 requires this block to know where to download dependencies for your app modules
allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// Notice how 'apply plugin: "com.facebook.react.rootproject"' is GONE!

subprojects {
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            project.android {
                if (namespace == null) {
                    if (project.name == 'react-native-fast-image') {
                        namespace 'com.dylanvann.fastimage'
                    } else {
                        namespace project.group
                    }
                }
            }
        }
    }
}
